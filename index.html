<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pessoa, Braz &amp; Carneiro Advocacia</title>
<link rel="icon" type="image/png" href="favicon-brasao.png" />
<link rel="apple-touch-icon" href="favicon-brasao.png" />
<meta name="description" content="Pessoa, Braz &amp; Carneiro Advocacia — escritório com sede em João Pessoa (PB) e atuação em 15 estados. Soluções estratégicas em Direito Público, Tributário, Empresarial, Imobiliário e mais." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Pessoa, Braz e Carneiro Advocacia" />
<meta property="og:description" content="Advocacia singular: soluções jurídicas estratégicas em Direito Público, Tributário, Empresarial e Imobiliário." />
<meta property="og:image" content="https://i.postimg.cc/NfD7TQrP/logo_pbc.png" />
<meta property="og:locale" content="pt_BR" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet" />
<style>
/* ============ TOKENS ============ */
:root{
  --ink:#00142e;          /* deep navy — primary dark */
  --ink-soft:#0a2444;     /* raised navy panel */
  --ink-deep:#000b1c;     /* footer / deepest */
  --gold:#cc9f52;         /* brand gold */
  --gold-bright:#e0bd80;  /* hover / highlight gold */
  --gold-deep:#a67e3a;
  --paper:#f6f3ec;        /* warm off-white (kills the "brancão") */
  --paper-2:#efe9df;      /* deeper warm panel */
  --paper-card:#fbf9f4;   /* card surface */
  --cream:#efe6d6;        /* text on dark */
  --cream-dim:rgba(239,230,214,.66);
  --ink-dim:rgba(0,20,46,.62);
  --line:rgba(0,20,46,.12);
  --line-strong:rgba(0,20,46,.20);
  --line-gold:rgba(204,159,82,.45);
  --line-dark:rgba(239,230,214,.16);
  --font-display:'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  --font-body:'Newsreader', Georgia, serif;
  --maxw:1280px;
  --pad:clamp(1.25rem, 5vw, 4rem);
  --sect:clamp(3rem, 6vw, 5rem);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--ink);
  font-size:clamp(1rem,.55vw + .9rem,1.12rem);
  line-height:1.72;
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
section{scroll-margin-top:3rem}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::selection{background:var(--gold);color:var(--ink)}

/* ============ PRIMITIVES ============ */
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.display{font-family:var(--font-display);font-weight:500;line-height:1.02;letter-spacing:-.012em}
.eyebrow{
  font-family:var(--font-body);text-transform:uppercase;
  letter-spacing:.3em;font-size:.72rem;font-weight:500;
  color:var(--gold);display:inline-flex;align-items:center;gap:.85em;white-space:nowrap;
}
.eyebrow::before{content:"";width:2.4rem;height:1px;background:currentColor;opacity:.7;flex:none}
.eyebrow.center::after{content:"";width:2.4rem;height:1px;background:currentColor;opacity:.7;flex:none}
.eyebrow.center{justify-content:center}
.gold{color:var(--gold)}
.text-pbc-gold{color:var(--gold)}
.text-pbc-blue{color:var(--ink)}
.on-dark .text-pbc-blue{color:var(--cream)}

.sect-head{max-width:46rem}
.sect-head.center{margin:0 auto;text-align:center}
.sect-title{font-family:var(--font-display);font-weight:500;font-size:clamp(2.5rem,5.2vw,4.5rem);line-height:1;letter-spacing:-.015em;margin-top:1.4rem}
.sect-sub{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:clamp(1.35rem,2.4vw,2rem);color:var(--gold);margin-top:1rem;line-height:1.2}
.on-dark .sect-title{color:var(--cream)}

.btn{
  display:inline-flex;align-items:center;gap:.7em;
  font-family:var(--font-body);font-size:.86rem;font-weight:500;
  letter-spacing:.16em;text-transform:uppercase;
  padding:1rem 1.9rem;border:1px solid var(--gold);
  transition:all .35s cubic-bezier(.2,.7,.3,1);cursor:pointer;
}
.btn .arr{transition:transform .35s ease}
.btn:hover .arr{transform:translateX(4px)}
.btn-solid{background:var(--gold);color:var(--ink);border-color:var(--gold)}
.btn-solid:hover{background:var(--gold-bright);border-color:var(--gold-bright)}
.btn-ghost{background:transparent;color:var(--cream)}
.btn-ghost:hover{background:var(--gold);color:var(--ink)}
.btn-ink{background:transparent;color:var(--ink);border-color:var(--line-strong)}
.btn-ink:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* ============ HEADER ============ */
header{position:fixed;top:0;left:0;right:0;z-index:60;transition:background .4s ease,box-shadow .4s ease,padding .4s ease;padding:.4rem 0}
header.scrolled{background:rgba(0,11,28,.86);backdrop-filter:blur(14px);box-shadow:0 1px 0 var(--line-dark)}
.nav-row{display:flex;align-items:center;justify-content:space-between;height:5rem;transition:height .4s ease}
header.scrolled .nav-row{height:4.4rem}
.brand{display:flex;flex-direction:column;line-height:1;gap:.35rem}
.brand .bn{font-family:var(--font-display);font-weight:600;font-size:1.18rem;letter-spacing:.04em;color:var(--cream);white-space:nowrap}
.brand .bs{font-family:var(--font-body);font-size:.6rem;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);padding-left:.1em}
.brand-logo{height:clamp(2.6rem,4.5vw,3.4rem);width:auto;display:block}
header.scrolled .brand-logo{height:clamp(2.3rem,4vw,3rem)}
nav.main{display:flex;align-items:center;gap:2.1rem}
.nav-link{font-family:var(--font-body);font-size:.95rem;color:var(--cream);position:relative;padding:.3rem 0;transition:color .3s}
.nav-link::after{content:"";position:absolute;left:0;bottom:-2px;height:1px;width:0;background:var(--gold);transition:width .35s ease}
.nav-link:hover{color:var(--gold-bright)}
.nav-link:hover::after{width:100%}
.langs{display:flex;align-items:center;gap:.35rem;margin-left:1rem;padding-left:1.4rem;border-left:1px solid var(--line-dark)}
.lang{background:none;border:none;cursor:pointer;padding:.3rem .3rem;display:inline-flex;align-items:center;opacity:.5;transition:opacity .25s}
.flag{width:18px;height:13px;border-radius:2px;overflow:hidden;display:inline-block;line-height:0;box-shadow:0 0 0 1px rgba(255,255,255,.2);flex:none}
.flag svg{display:block;width:100%;height:100%}
.lang:hover{opacity:1}
.lang.active{opacity:1}
.lang.active .flag{box-shadow:0 0 0 1px var(--gold),0 0 0 3px rgba(204,159,82,.22)}
.burger{display:none;background:none;border:none;color:var(--cream);cursor:pointer;padding:.4rem;width:2.6rem;height:2.6rem}
.burger svg{width:100%;height:100%}

/* mobile menu */
.mmenu{position:fixed;inset:0;z-index:70;background:var(--ink-deep);transform:translateY(-100%);visibility:hidden;pointer-events:none;overflow-y:auto;transition:transform .5s cubic-bezier(.7,0,.2,1),visibility 0s linear .5s;display:flex;flex-direction:column;padding:2rem var(--pad)}
.mmenu.open{transform:translateY(0);visibility:visible;pointer-events:auto;transition:transform .5s cubic-bezier(.7,0,.2,1),visibility 0s}
.mmenu .mm-top{display:flex;justify-content:space-between;align-items:center;height:5rem}
.mmenu nav{display:flex;flex-direction:column;gap:.4rem;margin-top:3vh}
.mmenu .nav-link{font-family:var(--font-display);font-size:2.4rem;color:var(--cream);letter-spacing:0}
.mmenu .nav-link::after{display:none}
.mmenu .nav-link:hover,.mmenu .nav-link:active{color:var(--gold)}
.mmenu .mm-langs{margin-top:auto;display:flex;gap:.4rem;padding-top:2rem;border-top:1px solid var(--line-dark)}

/* ============ HERO ============ */
.hero{position:relative;min-height:100svh;display:flex;align-items:center;overflow:hidden;background:var(--ink)}
.hero video,.hero .poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero .scrim{position:absolute;inset:0;z-index:1;background:
  linear-gradient(180deg,rgba(0,11,28,.55) 0%,rgba(0,11,28,.25) 35%,rgba(0,11,28,.55) 70%,rgba(0,11,28,.92) 100%),
  radial-gradient(120% 80% at 50% 30%,rgba(0,20,46,.15),rgba(0,11,28,.7))}
.hero .wrap{position:relative;z-index:2;width:100%;padding-top:7rem;padding-bottom:4rem}
.hero-inner{max-width:62rem;margin:0 auto;text-align:center}
.hero h1{font-family:var(--font-display);font-weight:500;color:#fff;font-size:clamp(1.7rem,4.4vw,3.4rem);line-height:1.04;letter-spacing:-.02em;margin-top:0}
.hero h1 .amp{font-style:italic;font-weight:400;color:var(--gold-bright)}
.hero .lede{font-family:var(--font-display);font-style:italic;font-weight:400;color:var(--cream);font-size:clamp(.95rem,1.6vw,1.25rem);margin-top:.9rem;line-height:1.25}
.hero .lede .dot{color:var(--gold)}
.hero .eyebrow{color:var(--gold-bright)}
.hero-cta{display:flex;flex-wrap:wrap;gap:1rem;margin-top:1.8rem;justify-content:center}
.hero .btn{padding:.78rem 1.45rem;font-size:.74rem}
.hero-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);width:min(30rem,80%);margin:2.4rem auto 0;opacity:.6}
.hero-foot{display:flex;gap:2.4rem;flex-wrap:wrap;margin-top:1.6rem;font-family:var(--font-body);font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-dim)}
.hero-foot span{display:inline-flex;align-items:center;gap:.7em}
.hero-foot span::before{content:"";width:5px;height:5px;background:var(--gold);transform:rotate(45deg);flex:none}

/* ============ ABOUT (dark editorial) ============ */
.about{background:var(--ink);color:var(--cream);position:relative;padding:var(--sect) 0}
.about::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 50% at 80% 0%,rgba(204,159,82,.06),transparent 60%);pointer-events:none}
.about .wrap{position:relative}
.about-top{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.25fr);gap:clamp(2.5rem,6vw,6rem);align-items:start}
.about-head{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4.5rem);align-items:center;margin-bottom:clamp(2.8rem,5vw,4.5rem)}
.about-head .about-statement{margin-top:0;font-size:clamp(1.7rem,3vw,2.6rem)}
.about-block{margin-bottom:clamp(2.8rem,5vw,4.5rem)}
.about-block .about-lede{margin-bottom:1.8rem}
.about-block .identity,.identity{color:var(--cream-dim)}
.about-statement{font-family:var(--font-display);font-weight:500;font-size:clamp(2rem,3.6vw,3.1rem);line-height:1.08;color:var(--cream);margin-top:1.4rem}
.about-statement .text-pbc-blue{color:var(--gold)}
.about-meta{margin-top:2.4rem;display:flex;flex-direction:column;gap:0}
.about-meta .mi{display:flex;flex-direction:column;gap:.2rem;padding:1.1rem 0;border-top:1px solid var(--line-dark)}
.about-meta .mi:last-child{border-bottom:1px solid var(--line-dark)}
.about-meta .mk{font-size:.68rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold)}
.about-meta .mv{font-family:var(--font-display);font-size:1.5rem;color:var(--cream)}
.about-essential{font-family:var(--font-display);font-weight:600;font-size:clamp(1.5rem,2.6vw,2.1rem);color:var(--cream);margin-bottom:1.1rem;line-height:1.05}
.about-essential .text-pbc-gold{color:var(--gold)}
.about-lede{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:clamp(1.4rem,2.2vw,1.9rem);line-height:1.32;color:#fff;border-left:2px solid var(--gold);padding-left:1.6rem}
.about-body{margin-top:2rem;color:var(--cream-dim);display:flex;flex-direction:column;gap:1.2rem;max-width:42rem}
.about-body p strong{color:var(--cream);font-weight:600}
.about-divide{display:flex;align-items:center;gap:1.5rem;margin:clamp(3.5rem,7vw,6rem) 0 2.6rem}
.about-divide .ln{flex:1;height:1px;background:var(--line-dark)}
.about-divide h3{font-family:var(--font-display);font-weight:500;font-size:clamp(1.8rem,3.4vw,2.8rem);color:var(--cream);white-space:nowrap}
.identity{columns:2;column-gap:clamp(2rem,5vw,4rem);color:var(--cream-dim)}
.identity p{margin-bottom:1.2rem;break-inside:avoid}
/* drop-cap removed per request */

/* ============ OFFICE BAND ============ */
.band{position:relative;height:clamp(38vh,55vh,60vh);background-size:cover;background-attachment:fixed}
.band .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,11,28,.6),rgba(0,11,28,.7)),radial-gradient(72% 72% at 50% 50%,rgba(0,11,28,.12),rgba(0,11,28,.55))}
.band-quote{position:relative;z-index:2;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 var(--pad)}
.band-quote p{font-family:var(--font-display);font-style:italic;font-weight:500;color:#fff;font-size:clamp(1.7rem,3.6vw,2.9rem);line-height:1.2;max-width:38rem;text-shadow:0 2px 22px rgba(0,0,0,.7),0 1px 3px rgba(0,0,0,.6)}
.band-quote .by{display:block;margin-top:1.4rem;font-family:var(--font-body);font-style:normal;font-size:.74rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-bright)}
@media (hover:none){.band{background-attachment:scroll}}

/* ============ PRACTICE AREAS ============ */
.practice{background:var(--paper);padding:var(--sect) 0}
.pa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-top:clamp(2.5rem,5vw,4rem)}
.pa-card{background:var(--paper);padding:clamp(1.6rem,2.4vw,2.3rem);position:relative;transition:background .4s ease,transform .4s ease;overflow:hidden}
.pa-card::before{content:"";position:absolute;top:0;left:0;height:2px;width:0;background:var(--gold);transition:width .45s cubic-bezier(.2,.7,.3,1)}
.pa-card:hover{background:var(--paper-card)}
.pa-card:hover::before{width:100%}
.pa-num{font-family:var(--font-display);font-size:.9rem;letter-spacing:.12em;color:var(--gold);display:block}
.pa-title{font-family:var(--font-display);font-weight:600;font-size:1.32rem;line-height:1.12;color:var(--ink);margin:.9rem 0 .9rem;min-height:2.5em;display:flex;align-items:flex-start}
.pa-desc{font-size:.96rem;line-height:1.6;color:var(--ink-dim)}

/* ============ TEAM ============ */
.team{background:var(--paper);padding:var(--sect) 0}
.team-group{margin-top:clamp(2.5rem,5vw,4rem)}
.role-head{display:flex;align-items:center;gap:1.4rem;margin-bottom:2.8rem}
.role-head .ln{flex:1;height:1px;background:var(--line)}
.role-head h3{font-family:var(--font-display);font-weight:500;font-size:clamp(1.7rem,3vw,2.4rem);color:var(--ink);white-space:nowrap}
.role-head h3 .text-pbc-gold{color:var(--gold)}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(2rem,4vw,3.5rem)}
.member{text-align:center;scroll-margin-top:8.5rem}
.member .ph{width:clamp(9rem,15vw,12.5rem);aspect-ratio:1;margin:0 auto;border-radius:50%;overflow:hidden;position:relative;box-shadow:0 14px 40px -18px rgba(0,20,46,.5)}
.member .ph::after{content:"";position:absolute;inset:0;border-radius:50%;border:1px solid var(--line-gold);box-shadow:inset 0 0 0 6px var(--paper);transition:box-shadow .4s ease}
.member .ph img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.2,.7,.3,1)}
.member:hover .ph img{transform:scale(1.06)}
.member:hover .ph::after{box-shadow:inset 0 0 0 4px var(--paper),inset 0 0 0 5px var(--gold)}
.member .nm{font-family:var(--font-display);font-weight:600;font-size:clamp(.92rem,1.05vw,1.06rem);white-space:nowrap;color:var(--ink);margin-top:1.5rem;line-height:1.1}
.member .nm strong{font-weight:600}
.member .bio{font-size:.86rem;line-height:1.55;color:var(--ink-dim);max-width:22rem;margin:.9rem auto 0}

/* ============ ARTICLES ============ */
.insights{background:var(--paper);padding:var(--sect) 0}
.ins-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(1.5rem,3vw,2.4rem);margin-top:clamp(2.5rem,5vw,4rem)}
.ins-grid .art{flex:1 1 240px;max-width:400px;min-width:0}
.art{display:block;background:var(--paper-card);border:1px solid var(--line);transition:border-color .4s ease,transform .4s ease,box-shadow .4s ease;overflow:hidden}
.art:hover{border-color:var(--line-gold);transform:translateY(-4px);box-shadow:0 24px 50px -30px rgba(0,20,46,.4)}
.art .im{aspect-ratio:40/21;overflow:hidden;background:var(--paper-2)}
.art .im img{width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
.art:hover .im img{transform:scale(1.05)}
.art .bd{padding:1.6rem}
.art .bd h4{font-family:var(--font-display);font-weight:600;font-size:1.3rem;line-height:1.18;color:var(--ink);transition:color .3s}
.art:hover .bd h4{color:var(--gold-deep)}
.art .more{display:inline-flex;align-items:center;gap:.5em;margin-top:1.1rem;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.art .more .arr{transition:transform .35s}
.art:hover .more .arr{transform:translateX(4px)}
.ph-img{background-image:repeating-linear-gradient(135deg,var(--paper-2),var(--paper-2) 11px,#e7e0d2 11px,#e7e0d2 22px);display:flex;align-items:center;justify-content:center}
.ph-img span{font-family:var(--font-body);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim)}
.art-author{display:flex;align-items:center;gap:.7rem;margin-top:1.2rem}
.art-author .aa-photo{width:2.4rem;height:2.4rem;border-radius:50%;object-fit:cover;flex:none;box-shadow:0 0 0 1px var(--line-gold)}
.art-author .aa-info{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.art-author .aa-by{font-family:var(--font-body);font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
.art-author .aa-name{font-family:var(--font-display);font-weight:600;font-size:.96rem;color:var(--ink)}
.art-author .aa-date{font-family:var(--font-body);font-size:.72rem;color:var(--ink-dim)}
.art-author + .more{margin-top:.7rem}
.ins-msg{text-align:center;color:var(--ink-dim);font-style:italic;font-family:var(--font-display);font-size:1.4rem;padding:3rem 0}

/* ============ CONTACT (dark) ============ */
.contact{background:var(--ink);color:var(--cream);padding:var(--sect) 0}
.contact .sect-title{color:var(--cream)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2.5rem,5vw,5rem);align-items:stretch;margin-top:clamp(2.5rem,5vw,4rem)}
.cinfo{display:flex;flex-direction:column;gap:2rem}
.cinfo .row{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.cblock .ck{font-size:.7rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem}
.cblock a,.cblock p{font-family:var(--font-display);font-size:1.25rem;color:var(--cream);line-height:1.4}
.cblock.addr p{font-size:1.05rem;font-family:var(--font-body);color:var(--cream-dim);line-height:1.6}
.cblock a:hover{color:var(--gold-bright)}
.cmap{border:1px solid var(--line-dark);overflow:hidden;filter:grayscale(.3) contrast(1.05);flex:1 1 auto;min-height:18rem}
.cmap iframe{display:block;width:100%;height:100%;min-height:18rem;border:0}
.cform{background:var(--ink-soft);border:1px solid var(--line-dark);padding:clamp(1.8rem,3vw,2.6rem)}
.field{margin-bottom:1.3rem}
.field label{display:block;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:.55rem}
.field input,.field textarea{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line-dark);color:var(--cream);font-family:var(--font-body);font-size:1rem;padding:.65rem .1rem;transition:border-color .3s}
.field textarea{resize:vertical;min-height:5rem}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:rgba(239,230,214,.3)}
.cform .btn{width:100%;justify-content:center;margin-top:.6rem}
.cform .priv{font-size:.74rem;color:var(--cream-dim);text-align:center;margin-top:1rem;line-height:1.5}
.cform-status{font-size:.84rem;text-align:center;margin-top:.95rem;line-height:1.5;display:none}
.cform-status.show{display:block}
.cform-status.ok{color:var(--gold-bright)}
.cform-status.err{color:#e6a6a6}

/* ============ FOOTER ============ */
footer{background:var(--ink-deep);color:var(--cream-dim);padding:clamp(3.5rem,7vw,5.5rem) 0 2.5rem}
.foot-top{display:flex;justify-content:space-between;gap:2.5rem;flex-wrap:wrap;padding-bottom:2.5rem;border-bottom:1px solid var(--line-dark)}
.foot-brand .bn{font-family:var(--font-display);font-weight:600;font-size:1.5rem;color:var(--cream);letter-spacing:.03em}
.foot-logo{height:3.4rem;width:auto;margin-bottom:.8rem;display:block}
.foot-brand .bs{font-family:var(--font-body);font-size:.62rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-top:.4rem}
.foot-nav{display:flex;gap:1.6rem;flex-wrap:wrap;align-items:center}
.foot-nav a{font-size:.85rem;color:var(--cream-dim);transition:color .3s}
.foot-nav a:hover{color:var(--gold)}
.foot-bot{margin-top:2.2rem;display:flex;justify-content:flex-end;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:rgba(239,230,214,.45)}

/* ============ RESPONSIVE ============ */
@media (max-width:1024px){
  nav.main,.langs{display:none}
  .burger{display:block}
  .pa-grid{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:860px){
  .about-top,.about-head{grid-template-columns:1fr;gap:2.5rem}
  .identity{columns:1}
  .team-grid{grid-template-columns:repeat(2,1fr)}
  .ins-grid.is-3{justify-content:center}
  .contact-grid{grid-template-columns:1fr}
  .pa-title{min-height:0}
}
@media (max-width:560px){
  .pa-grid,.team-grid{grid-template-columns:1fr}
  .cinfo .row{grid-template-columns:1fr}
  .hero-cta{flex-direction:column;align-items:stretch}
  .hero-cta .btn{justify-content:center}
}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .9s ease,transform .9s cubic-bezier(.2,.7,.3,1)}
.reveal.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}.band{background-attachment:scroll}}

/* ============ ARTICLE PAGE ============ */
.post-wrap{background:var(--paper);min-height:100vh}
/* header sólido durante a leitura (fundo claro exige links legíveis) */
body.reading header{background:rgba(0,11,28,.92);backdrop-filter:blur(14px);box-shadow:0 1px 0 var(--line-dark)}
.post{max-width:44rem;margin:0 auto;padding:clamp(7rem,11vh,9.5rem) var(--pad) var(--sect)}
.post-back{display:inline-flex;align-items:center;gap:.5em;font-family:var(--font-body);font-size:.72rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);transition:color .3s}
.post-back:hover{color:var(--gold-deep)}
.post-back.foot{margin-top:3.5rem;padding-top:1.8rem;border-top:1px solid var(--line);width:100%;justify-content:flex-start}
.post .eyebrow{margin-top:0;font-size:.66rem}
.post .eyebrow::before{width:1.9rem}
.post .eyebrow::after{content:"";width:1.9rem;height:1px;background:currentColor;opacity:.7;flex:none}
.post-title{font-family:var(--font-display);font-weight:600;font-size:clamp(2.1rem,5vw,3.4rem);line-height:1.06;letter-spacing:-.015em;color:var(--ink);margin-top:1rem}
.post-meta{font-family:var(--font-body);font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-top:1.1rem}
.post-byline{display:flex;align-items:center;gap:.95rem;margin-top:1.6rem}
.post-byline .pb-photo-link{display:block;flex:none;border-radius:50%;transition:box-shadow .3s}
.post-byline .pb-photo{width:3rem;height:3rem;border-radius:50%;object-fit:cover;display:block;box-shadow:0 0 0 1px var(--line-gold),0 6px 16px -8px rgba(0,20,46,.4)}
.post-byline .pb-photo-link:hover .pb-photo{box-shadow:0 0 0 2px var(--gold),0 8px 18px -8px rgba(0,20,46,.45)}
.post-byline .pb-info{display:flex;flex-direction:column;line-height:1.3}
.post-byline .pb-by{font-family:var(--font-body);font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
.post-byline .pb-name{font-family:var(--font-display);font-weight:600;font-size:1.08rem;color:var(--ink);text-decoration:none;transition:color .3s;align-self:flex-start}
.post-byline a.pb-name:hover{color:var(--gold-deep)}
.post-byline .pb-role{font-family:var(--font-body);font-size:.78rem;color:var(--ink-dim)}
.post-excerpt{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:clamp(1.3rem,2.4vw,1.75rem);line-height:1.34;color:var(--gold-deep);margin-top:1.6rem;border-left:2px solid var(--gold);padding-left:1.3rem}
.post-cover{margin:2.6rem 0 0;aspect-ratio:40/21;overflow:hidden;border:1px solid var(--line)}
.post-cover img{width:100%;height:100%;object-fit:cover}
.post-body{margin-top:2.4rem;color:var(--ink);font-size:1.08rem;line-height:1.82;text-align:justify;-webkit-hyphens:auto;hyphens:auto}
.post-body p{margin-bottom:1.45rem}
.post-body h2{font-family:var(--font-display);font-weight:600;font-size:clamp(1.5rem,2.8vw,2.1rem);line-height:1.14;color:var(--ink);margin:2.8rem 0 1.1rem;text-align:left}
.post-body ul{margin:0 0 1.45rem;padding-left:1.3rem}
.post-body li{margin-bottom:.55rem;padding-left:.3rem}
.post-body li::marker{color:var(--gold)}
.post-body blockquote{margin:2rem 0;padding:.2rem 0 .2rem 1.6rem;border-left:2px solid var(--gold);font-family:var(--font-display);font-style:italic;font-size:clamp(1.3rem,2.2vw,1.6rem);line-height:1.3;color:var(--ink-dim)}
.post-body a{color:var(--gold-deep);text-decoration:underline;text-underline-offset:3px;text-decoration-thickness:1px}
.post-body a:hover{color:var(--gold)}
.post-body strong{font-weight:600}
</style>
</head>
<body>

<!-- HEADER -->
<header id="hdr">
  <div class="wrap nav-row">
    <a href="#home" class="brand" aria-label="Pessoa, Braz & Carneiro Advocacia">
      <img src="https://i.postimg.cc/NfD7TQrP/logo_pbc.png" alt="Pessoa, Braz & Carneiro Advocacia" class="brand-logo" />
    </a>
    <nav class="main" id="navMain"></nav>
    <button class="burger" id="burger" aria-label="Abrir menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
    </button>
  </div>
</header>

<!-- MOBILE MENU -->
<div class="mmenu" id="mmenu">
  <div class="mm-top wrap" style="padding:0">
    <span class="brand"><img src="https://i.postimg.cc/NfD7TQrP/logo_pbc.png" alt="PBC" class="brand-logo" /></span>
    <button class="burger" id="burgerClose" aria-label="Fechar menu" style="display:block">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <nav id="navMobile"></nav>
  <div class="mm-langs" id="langMobile"></div>
</div>

<main>
<div id="homeView">
<!-- HERO -->
<section id="home" class="hero">
  <video autoplay loop muted playsinline id="heroVid"></video>
  <div class="scrim"></div>
  <div class="wrap">
    <div class="hero-inner">
      <h1><span id="heroTitle"></span><span class="amp">.</span></h1>
      <p class="lede"><span data-i18n="hero.subtitle"></span><span class="dot">.</span></p>
      <div class="hero-cta">
        <a href="#atuacao" class="btn btn-solid"><span data-i18n="hero.cta1"></span><span class="arr">→</span></a>
        <a href="#contato" class="btn btn-ghost"><span data-i18n="hero.cta2"></span></a>
      </div>
    </div>
  </div>
</section>

<!-- ABOUT -->
<section id="sobre" class="about on-dark">
  <div class="wrap">
    <div class="about-head reveal">
      <div>
        <span class="eyebrow" data-i18n="about.kicker">O escritório</span>
        <h2 class="sect-title" data-i18n="about.title">Sobre o PBC</h2>
      </div>
      <p class="about-statement" data-i18n-html="about.subtitle"></p>
    </div>

    <div class="about-divide reveal">
      <h3 data-i18n-html="about.section1_title">O Essencial</h3>
      <span class="ln"></span>
    </div>
    <div class="about-block reveal">
      <p class="about-lede" data-i18n="about.section1_p1"></p>
      <div class="identity">
        <p data-i18n="about.section1_p2"></p>
        <p data-i18n="about.section1_p3"></p>
      </div>
    </div>

    <div class="about-divide reveal">
      <h3 data-i18n-html="about.section2_title">A Identidade</h3>
      <span class="ln"></span>
    </div>
    <div class="identity reveal">
      <p data-i18n="about.section2_p1"></p>
      <p data-i18n="about.section2_p2"></p>
      <p data-i18n="about.section2_p3"></p>
      <p data-i18n="about.section2_p4"></p>
      <p data-i18n="about.section2_p5"></p>
    </div>
  </div>
</section>

<!-- BAND 1 -->
<section class="band" data-band="0" aria-label="Ambiente do escritório">
  <div class="ov"></div>
  <div class="band-quote"><p><em class="bq" data-q="0"></em></p></div>
</section>

<!-- PRACTICE -->
<section id="atuacao" class="practice">
  <div class="wrap">
    <div class="sect-head center reveal">
      <span class="eyebrow center" data-i18n="practiceAreas.kicker">O que fazemos</span>
      <h2 class="sect-title" data-i18n="practiceAreas.title">Áreas de Atuação</h2>
      <p class="sect-sub" data-i18n-html="practiceAreas.subtitle"></p>
    </div>
    <div class="pa-grid" id="paGrid"></div>
  </div>
</section>

<!-- BAND 2 -->
<section class="band" data-band="1" aria-label="Ambiente de colaboração">
  <div class="ov"></div>
  <div class="band-quote"><p><em class="bq" data-q="1"></em></p></div>
</section>

<!-- TEAM -->
<section id="equipe" class="team">
  <div class="wrap">
    <div class="sect-head center reveal">
      <span class="eyebrow center" data-i18n="team.kicker">Quem somos</span>
      <h2 class="sect-title" data-i18n="team.title">Equipe</h2>
      <p class="sect-sub" data-i18n-html="team.subtitle"></p>
    </div>
    <div id="teamWrap"></div>
  </div>
</section>

<!-- BAND 3 -->
<section class="band" data-band="2" aria-label="Biblioteca e pesquisa">
  <div class="ov"></div>
  <div class="band-quote"><p><em class="bq" data-q="2"></em></p></div>
</section>

<!-- INSIGHTS -->
<section id="insights" class="insights">
  <div class="wrap">
    <div class="sect-head center reveal">
      <span class="eyebrow center" data-i18n="insights.kicker">Publicações</span>
      <h2 class="sect-title" data-i18n="insights.title">Artigos</h2>
      <p class="sect-sub" data-i18n-html="insights.subtitle"></p>
    </div>
    <div id="insWrap"></div>
  </div>
</section>

<!-- BAND 4 -->
<section class="band" data-band="3" aria-label="Networking e contato">
  <div class="ov"></div>
  <div class="band-quote"><p><em class="bq" data-q="3"></em></p></div>
</section>

<!-- CONTACT -->
<section id="contato" class="contact on-dark">
  <div class="wrap">
    <div class="sect-head reveal">
      <span class="eyebrow" data-i18n="contact.kicker">Fale conosco</span>
      <h2 class="sect-title" data-i18n="contact.title">Como podemos ajudar?</h2>
      <p class="sect-sub" data-i18n-html="contact.subtitle"></p>
    </div>
    <div class="contact-grid">
      <div class="cinfo reveal">
        <div class="row">
          <div class="cblock"><div class="ck" data-i18n="contact.email">E-mail</div><a href="mailto:contato@pbc.adv.br">contato@pbc.adv.br</a></div>
          <div class="cblock"><div class="ck" data-i18n="contact.instagram">Instagram</div><a href="https://instagram.com/pbc.adv" target="_blank" rel="noopener">@pbc.adv</a></div>
        </div>
        <div class="cblock addr"><div class="ck" data-i18n="contact.address">Endereço</div><p data-i18n="contact.address_details"></p></div>
        <div class="cmap">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3959.067557380639!2d-34.840717!3d-7.118169899999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x7acdd482f052ec9%3A0xa68eb0f9e19e8532!2sGreen%20Tower!5e0!3m2!1spt-BR!2sbr!4v1771184399174!5m2!1spt-BR!2sbr" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Localização do escritório"></iframe>
        </div>
      </div>
      <form class="cform reveal" id="contactForm">
        <div class="field"><label data-i18n="contact.form_name">Nome Completo</label><input type="text" name="name" required /></div>
        <div class="field"><label data-i18n="contact.form_email">Email</label><input type="email" name="email" required /></div>
        <div class="field"><label data-i18n="contact.form_phone">Telefone/WhatsApp</label><input type="tel" name="phone" /></div>
        <div class="field"><label data-i18n="contact.form_company">Empresa (Opcional)</label><input type="text" name="company" /></div>
        <div class="field"><label data-i18n="contact.form_message">Mensagem</label><textarea name="message" required></textarea></div>
        <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0" />
        <button type="submit" class="btn btn-solid"><span data-i18n="contact.form_submit">Enviar Mensagem</span><span class="arr">→</span></button>
        <p class="cform-status" id="formStatus" role="status" aria-live="polite"></p>
        <p class="priv" data-i18n="contact.form_privacy"></p>
      </form>
    </div>
  </div>
</section>
</div><!-- /#homeView -->

</main>

    </div>
  </div>
